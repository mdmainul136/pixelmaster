version: '3.8'

services:
  # ── 1. Laravel PHP-FPM Application ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: coolify_app
    restart: always
    env_file: .env
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    networks:
      - coolify_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      kafka:
        condition: service_started

  # ── 2. Nginx (Laravel Web Server) ───────────────────────────────────────────
  web:
    image: nginx:alpine
    container_name: coolify_web
    restart: always
    volumes:
      - ./public:/var/www/public
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - coolify_network
    depends_on:
      - app

  # ── 3. Database (MySQL 8) ───────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: coolify_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-tenant_master}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - coolify_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - coolify_network

  # ── 4. Cache & Queues (Redis) ───────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: coolify_redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - coolify_redis_data:/data
    networks:
      - coolify_network

  # ── 5. Analytics (ClickHouse) ──────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: coolify_clickhouse
    restart: always
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - coolify_clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - coolify_network

  # ── 6. Message Broker (Kafka & Zookeeper Stack) ────────────────────────────
  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: coolify_zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - coolify_network

  kafka:
    image: bitnami/kafka:latest
    container_name: coolify_kafka
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    networks:
      - coolify_network
    depends_on:
      - zookeeper

  # ── 7. Worker (Background Jobs) ─────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: coolify_worker
    restart: always
    command: php artisan queue:work --tries=3
    env_file: .env
    depends_on:
      - db
      - redis
      - kafka
    networks:
      - coolify_network

networks:
  coolify_network:
    external: false

volumes:
  coolify_db_data:
  coolify_redis_data:
  coolify_clickhouse_data:
