version: '3.8'

services:
  # ── 1. Laravel Inertia + PHP-FPM ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: always
    # Removed env_file: .env (Coolify handles this via dashboard)
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    networks:
      - coolify_internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # ── 2. Nginx Public Proxy ──────────────────────────────────────────────────
  web:
    image: nginx:alpine
    restart: always
    volumes:
      - ./public:/var/www/public
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - coolify_internal
      - coolify # For Coolify's Traefik/Nginx proxy
    depends_on:
      - app

  # ── 3. Database (MySQL) ────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-tenant_master}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - coolify_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - coolify_internal

  # ── 4. Cache & Queues (Redis) ──────────────────────────────────────────────
  redis:
    image: redis:alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redis_data:/data
    networks:
      - coolify_internal

  # ── 5. Analytics (ClickHouse) ──────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: always
    # Ports removed to prevent conflict with PHP-FPM (9000) and for internal security
    volumes:
      - coolify_clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - coolify_internal

  # ── 6. Message Broker (Kafka) ──────────────────────────────────────────────
  zookeeper:
    image: bitnami/zookeeper:latest
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    networks:
      - coolify_internal

  kafka:
    image: bitnami/kafka:latest
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    networks:
      - coolify_internal
    depends_on:
      - zookeeper

  # ── 7. Worker (Laravel Queues) ─────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: always
    command: php artisan queue:work --tries=3
    # Removed env_file: .env 
    depends_on:
      - db
      - redis
      - kafka
    networks:
      - coolify_internal

networks:
  coolify_internal:
    driver: bridge
  coolify:
    external: true

volumes:
  coolify_db_data:
  coolify_clickhouse_data:
  redis_data:
