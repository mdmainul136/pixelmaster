services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: always
    volumes:
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    networks:
      - coolify_internal
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    image: nginx:alpine
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`${SERVICE_FQDN_APP}`)"
      - "traefik.http.services.web.loadbalancer.server.port=80"
    volumes:
      - ./public:/var/www/public
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - coolify_internal
      - coolify
    depends_on:
      - app

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - coolify_db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10
    networks:
      - coolify_internal

  redis:
    image: redis:alpine
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redis_data:/data
    networks:
      - coolify_internal

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: always
    volumes:
      - coolify_clickhouse_data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - coolify_internal

  zookeeper:
    image: bitnami/zookeeper:latest
    restart: always
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    networks:
      - coolify_internal

  kafka:
    image: bitnami/kafka:latest
    restart: always
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: "zookeeper:2181"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
    networks:
      - coolify_internal
    depends_on:
      - zookeeper

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: always
    command: php artisan queue:work --tries=3
    depends_on:
      - db
      - redis
      - kafka
    networks:
      - coolify_internal

networks:
  coolify_internal:
    driver: bridge
  coolify:
    external: true

volumes:
  coolify_db_data:
  coolify_clickhouse_data:
  redis_data:
