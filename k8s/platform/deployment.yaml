# ─────────────────────────────────────────────────────────────────────────────
# Platform Kubernetes Deployment (Web / Worker / Scheduler)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-web
  namespace: platform-core
  labels:
    app: platform
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: platform
      component: web
  template:
    metadata:
      labels:
        app: platform
        component: web
    spec:
      containers:
        - name: php-fpm
          image: your-registry/platform:latest
          ports:
            - containerPort: 9000
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: platform-web-svc
  namespace: platform-core
spec:
  selector:
    app: platform
    component: web
  ports:
    - protocol: TCP
      port: 9000
      targetPort: 9000
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: platform-web-hpa
  namespace: platform-core
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: platform-web
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
