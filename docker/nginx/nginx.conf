user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 4096;
    use                epoll;
    multi_accept       on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/json;

    # ── Logging ────────────────────────────────────────────────────────────────
    log_format tracking '$remote_addr - [$time_local] "$request" '
                        '$status $body_bytes_sent '
                        '"$http_x_request_id" "$http_user_agent"';

    access_log /var/log/nginx/access.log tracking;

    # ── Performance ────────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    gzip                on;
    gzip_types          text/plain application/json application/javascript text/css;
    gzip_min_length     1024;

    # ── Request buffer tuning for event payloads ──────────────────────────────
    client_max_body_size    1m;
    client_body_buffer_size 16k;

    # ── Proxy cache zone ──────────────────────────────────────────────────────
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=loader_cache:10m
                     max_size=1g inactive=60m use_temp_path=off;

    # ── Include per-tenant server blocks ──────────────────────────────────────
    include /etc/nginx/conf.d/*.conf;
}
